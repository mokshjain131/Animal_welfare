services:
  - type: web
    name: animal-welfare-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false          # paste from Supabase → Project Settings → API
      - key: SUPABASE_KEY
        sync: false          # anon public key from Supabase
      - key: NEWSAPI_KEY
        sync: false          # from newsapi.org (optional)
      - key: HF_API_TOKEN
        sync: false          # HuggingFace token (optional)
      - key: PYTHON_VERSION
        value: "3.13.0"
